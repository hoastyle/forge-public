name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --frozen --extra server --extra llm
      - name: Run Go CLI tests
        run: go test ./cmd/forge
      - name: Run Python tests
        run: uv run --no-env-file python -m unittest discover -s tests
      - name: Validate provenance
        run: ./automation/scripts/validate-provenance.sh
      - name: Diff check
        run: git diff --check && git diff --exit-code
